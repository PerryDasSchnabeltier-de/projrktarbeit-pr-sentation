  <script>
	let menüKnopf = document.getElementById("Menü_Knopf");
	let menü = document.getElementById("Menü");

	function Menü_Knopf() {
		if (menü.style.display == "none") {
			menü.style.display = "block";
		} 
	}

	function Menü() {
		if (menü.style.display == "block") {
			menü.style.display = "none";
		}
	}
			
	menüKnopf.addEventListener("mouseenter", Menü_Knopf);
	menü.addEventListener("mouseleave", Menü);
